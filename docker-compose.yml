# Arquitetura da Triar API
#
#   App MAUI ──► nginx (load balancer, porta 5036) ──► api1 / api2 (ASP.NET Core)
#                                                          │        │
#                                                          ▼        ▼
#                                                   SQL Server    Redis
#                                                     2022       (cache)
#
# Subir tudo:  docker compose up -d --build
# A API fica disponível em http://localhost:5036 (mesma porta que o app usa).

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: triar-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Triar@2026Forte"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - triar-sql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Triar@2026Forte' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: triar-redis
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api1: &api
    build: ./Triagem.API/Triagem.API
    container_name: triar-api-1
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=TriarDb;User Id=sa;Password=Triar@2026Forte;TrustServerCertificate=True;Encrypt=True"
      ConnectionStrings__Redis: "redis:6379"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # api2 espera a api1 ficar saudável: evita corrida na criação/seed do banco
  api2:
    <<: *api
    container_name: triar-api-2
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
      api1:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: triar-loadbalancer
    ports:
      - "5036:5036"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    restart: unless-stopped

volumes:
  triar-sql-data:
