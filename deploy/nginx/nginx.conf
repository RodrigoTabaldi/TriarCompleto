worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ---------- Load balancer: distribui entre as instâncias da API ----------
    upstream triar_api {
        least_conn;
        server api1:8080 max_fails=3 fail_timeout=10s;
        server api2:8080 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # rate limit de borda (além do rate limit da própria API)
    limit_req_zone $binary_remote_addr zone=borda:10m rate=30r/s;

    server {
        listen 5036;

        location / {
            limit_req zone=borda burst=60 nodelay;

            proxy_pass http://triar_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;

            # failover automático entre instâncias
            proxy_next_upstream error timeout http_502 http_503 http_504;
        }

        location /health {
            proxy_pass http://triar_api/health;
        }
    }
}
